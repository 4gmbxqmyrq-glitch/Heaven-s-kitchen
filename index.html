<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heaven’s Kitchen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      background: url('menu.jpg') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 40px;
      margin: 0;
      letter-spacing: 2px;
    }

    .tagline {
      margin-top: 10px;
      font-size: 18px;
      color: #ddd;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #e63946;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .menu-image {
      width: 100%;
      max-width: 700px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      margin: 20px auto;
      max-width: 500px;
    }

    footer {
      background: #000;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <div class="hero-content">
    <h1>Heaven’s Kitchen</h1>
    <p class="tagline">Fresh • Bold • Made with Love</p>
    <button class="btn" onclick="showMessage()">Order Now</button>
  </div>
</header>

<section class="section">
  <h2>Our Menu</h2>
  <img src="menu.jpg" alt="Menu" class="menu-image">
</section>

<section class="section">
  <div class="card">
    <h2>About Us</h2>
    <p>Serving you since 2023. We bring bold flavors and fresh ingredients together to create unforgettable meals.</p>
  </div>

  <div class="card">
    <h2>Hours</h2>
    <p>Mon–Sun: 11am – 10pm</p>
  </div>
</section>

<footer>
  <p>© 2026 Heaven’s Kitchen • All Rights Reserved</p>
</footer>

<script>
  function showMessage() {
    alert("We’re excited to serve you!");
  }
</script>

</body>
</html>
